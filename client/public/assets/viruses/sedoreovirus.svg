<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <rect width="800" height="800" fill="#000000" />
  
  <!-- First virus -->
  <g transform="translate(200, 200)">
    <circle cx="0" cy="0" r="120" fill="#ff3333" opacity="0.8"/>
    <circle cx="0" cy="0" r="100" fill="#ffcc00" opacity="0.7"/>
    <circle cx="0" cy="0" r="80" fill="#33cc33" opacity="0.7"/>
    <circle cx="0" cy="0" r="60" fill="#3333ff" opacity="0.7"/>
  </g>
  
  <!-- Second virus -->
  <g transform="translate(600, 200)">
    <circle cx="0" cy="0" r="120" fill="#ffcc00" opacity="0.8"/>
    <circle cx="0" cy="0" r="100" fill="#33cc33" opacity="0.7"/>
    <circle cx="0" cy="0" r="80" fill="#3333ff" opacity="0.7"/>
    <circle cx="0" cy="0" r="60" fill="#ff3333" opacity="0.7"/>
  </g>
  
  <!-- Third virus -->
  <g transform="translate(200, 600)">
    <circle cx="0" cy="0" r="120" fill="#33cc33" opacity="0.8"/>
    <circle cx="0" cy="0" r="100" fill="#3333ff" opacity="0.7"/>
    <circle cx="0" cy="0" r="80" fill="#ff3333" opacity="0.7"/>
    <circle cx="0" cy="0" r="60" fill="#ffcc00" opacity="0.7"/>
  </g>
  
  <!-- Fourth virus (with hole in center) -->
  <g transform="translate(600, 600)">
    <circle cx="0" cy="0" r="120" fill="#3333ff" opacity="0.8"/>
    <circle cx="0" cy="0" r="100" fill="#ff3333" opacity="0.7"/>
    <circle cx="0" cy="0" r="80" fill="#ffcc00" opacity="0.7"/>
    <circle cx="0" cy="0" r="60" fill="#33cc33" opacity="0.7"/>
    <circle cx="0" cy="0" r="40" fill="#000000"/>
    
    <!-- Spokes radiating from center -->
    <g stroke="#ffffff" stroke-width="3" opacity="0.8">
      <line x1="-36" y1="0" x2="-80" y2="0"/>
      <line x1="36" y1="0" x2="80" y2="0"/>
      <line x1="0" y1="-36" x2="0" y2="-80"/>
      <line x1="0" y1="36" x2="0" y2="80"/>
      <line x1="-25" y1="-25" x2="-56" y2="-56"/>
      <line x1="25" y1="-25" x2="56" y2="-56"/>
      <line x1="-25" y1="25" x2="-56" y2="56"/>
      <line x1="25" y1="25" x2="56" y2="56"/>
    </g>
  </g>
  
  <!-- Surface details on all viruses -->
  <g fill="#ffffff" opacity="0.5">
    <!-- Details on first virus -->
    <circle cx="180" cy="180" r="8"/>
    <circle cx="220" cy="180" r="6"/>
    <circle cx="200" cy="230" r="7"/>
    <circle cx="170" cy="210" r="5"/>
    <circle cx="230" cy="200" r="6"/>
    
    <!-- Details on second virus -->
    <circle cx="580" cy="180" r="8"/>
    <circle cx="620" cy="180" r="6"/>
    <circle cx="600" cy="230" r="7"/>
    <circle cx="570" cy="210" r="5"/>
    <circle cx="630" cy="200" r="6"/>
    
    <!-- Details on third virus -->
    <circle cx="180" cy="580" r="8"/>
    <circle cx="220" cy="580" r="6"/>
    <circle cx="200" cy="630" r="7"/>
    <circle cx="170" cy="610" r="5"/>
    <circle cx="230" cy="600" r="6"/>
    
    <!-- Details on fourth virus -->
    <circle cx="580" cy="580" r="8"/>
    <circle cx="620" cy="580" r="6"/>
    <circle cx="600" cy="630" r="7"/>
    <circle cx="570" cy="610" r="5"/>
    <circle cx="630" cy="600" r="6"/>
  </g>
</svg>