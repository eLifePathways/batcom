<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800">
  <defs>
    <radialGradient id="rhabdoBg" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" style="stop-color:#001133;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000011;stop-opacity:1" />
    </radialGradient>
  </defs>
  <rect width="800" height="800" fill="url(#rhabdoBg)" />
  
  <!-- First bullet-shaped virus -->
  <g transform="translate(300, 400)">
    <!-- Main body -->
    <ellipse cx="0" cy="0" rx="150" ry="70" fill="#ffaa44" opacity="0.8"/>
    
    <!-- Surface spikes -->
    <g stroke="#ffdd99" stroke-width="2" fill="none">
      <g id="spike1">
        <line x1="-145" y1="-10" x2="-160" y2="-20"/>
      </g>
      <!-- Duplicate around the virus -->
      <use href="#spike1" transform="rotate(10)"/>
      <use href="#spike1" transform="rotate(20)"/>
      <use href="#spike1" transform="rotate(30)"/>
      <use href="#spike1" transform="rotate(40)"/>
      <use href="#spike1" transform="rotate(50)"/>
      <use href="#spike1" transform="rotate(60)"/>
      <use href="#spike1" transform="rotate(70)"/>
      <use href="#spike1" transform="rotate(80)"/>
      <use href="#spike1" transform="rotate(90)"/>
      <use href="#spike1" transform="rotate(100)"/>
      <use href="#spike1" transform="rotate(110)"/>
      <use href="#spike1" transform="rotate(120)"/>
      <use href="#spike1" transform="rotate(130)"/>
      <use href="#spike1" transform="rotate(140)"/>
      <use href="#spike1" transform="rotate(150)"/>
      <use href="#spike1" transform="rotate(160)"/>
      <use href="#spike1" transform="rotate(170)"/>
      <use href="#spike1" transform="rotate(180)"/>
      <use href="#spike1" transform="rotate(190)"/>
      <use href="#spike1" transform="rotate(200)"/>
      <use href="#spike1" transform="rotate(210)"/>
      <use href="#spike1" transform="rotate(220)"/>
      <use href="#spike1" transform="rotate(230)"/>
      <use href="#spike1" transform="rotate(240)"/>
      <use href="#spike1" transform="rotate(250)"/>
      <use href="#spike1" transform="rotate(260)"/>
      <use href="#spike1" transform="rotate(270)"/>
      <use href="#spike1" transform="rotate(280)"/>
      <use href="#spike1" transform="rotate(290)"/>
      <use href="#spike1" transform="rotate(300)"/>
      <use href="#spike1" transform="rotate(310)"/>
      <use href="#spike1" transform="rotate(320)"/>
      <use href="#spike1" transform="rotate(330)"/>
      <use href="#spike1" transform="rotate(340)"/>
      <use href="#spike1" transform="rotate(350)"/>
    </g>
    
    <!-- Internal structure -->
    <ellipse cx="0" cy="0" rx="120" ry="50" fill="#ff9922" opacity="0.8"/>
    <ellipse cx="0" cy="0" rx="90" ry="30" fill="#ff7700" opacity="0.7"/>
  </g>
  
  <!-- Second bullet-shaped virus -->
  <g transform="translate(550, 400) rotate(30)">
    <!-- Main body -->
    <ellipse cx="0" cy="0" rx="120" ry="60" fill="#ffaa44" opacity="0.8"/>
    
    <!-- Surface spikes -->
    <g stroke="#ffdd99" stroke-width="2" fill="none">
      <g id="spike2">
        <line x1="-115" y1="-10" x2="-130" y2="-20"/>
      </g>
      <!-- Duplicate around the virus -->
      <use href="#spike2" transform="rotate(20)"/>
      <use href="#spike2" transform="rotate(40)"/>
      <use href="#spike2" transform="rotate(60)"/>
      <use href="#spike2" transform="rotate(80)"/>
      <use href="#spike2" transform="rotate(100)"/>
      <use href="#spike2" transform="rotate(120)"/>
      <use href="#spike2" transform="rotate(140)"/>
      <use href="#spike2" transform="rotate(160)"/>
      <use href="#spike2" transform="rotate(180)"/>
      <use href="#spike2" transform="rotate(200)"/>
      <use href="#spike2" transform="rotate(220)"/>
      <use href="#spike2" transform="rotate(240)"/>
      <use href="#spike2" transform="rotate(260)"/>
      <use href="#spike2" transform="rotate(280)"/>
      <use href="#spike2" transform="rotate(300)"/>
      <use href="#spike2" transform="rotate(320)"/>
      <use href="#spike2" transform="rotate(340)"/>
    </g>
    
    <!-- Internal structure -->
    <ellipse cx="0" cy="0" rx="90" ry="40" fill="#ff9922" opacity="0.8"/>
    <ellipse cx="0" cy="0" rx="60" ry="20" fill="#ff7700" opacity="0.7"/>
  </g>
</svg>